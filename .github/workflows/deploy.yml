name: Deploy to VPS via SSH

on:
  push:
    branches:
      - master

permissions:
  contents: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Debian VPS via SSH and run deploy.sh
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd "/root/papayoo-counter/papyoo-counter"
            ./deploy.sh

      - name: Create GitHub Deployment
        id: create_deployment
        uses: octokit/request-action@v2.x
        with:
          route: POST /repos/${{ github.repository }}/deployments
          data: |
            {
              "ref": "${{ github.sha }}",
              "environment": "production",
              "description": "Deploying to papayoo.m-legal.fr",
              "auto_merge": false,
              "required_contexts": []
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark Deployment as Successful
        uses: octokit/request-action@v2.x
        with:
          route: POST /repos/${{ github.repository }}/deployments/${{ steps.create_deployment.outputs.data.id }}/statuses
          data: |
            {
              "state": "success",
              "environment_url": "https://papayoo.m-legal.fr",
              "description": "Deployment succeeded and is live at papayoo.m-legal.fr"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
